server:
  port: 8082
spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_service
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format-sql: true
eureka:
  client:
    service-url:
       default-zone: ${EUREKA_SERVER:http://localhost:8761/eureka}

management:
  endpoints:
    web:
     exposure:
       include: health,info
